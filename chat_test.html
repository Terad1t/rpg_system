<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Chat - Teste</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 600px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 600px;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .status {
            font-size: 12px;
            padding: 5px 10px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        .status.connected {
            background: #4caf50;
        }

        .status.disconnected {
            background: #f44336;
        }

        .login-form {
            padding: 20px;
            background: #f9f9f9;
            border-bottom: 1px solid #e0e0e0;
        }

        .form-group {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }

        .form-group input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        .form-group button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .form-group button:hover {
            background: #764ba2;
        }

        .form-group button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: white;
        }

        .message {
            margin-bottom: 15px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.system {
            text-align: center;
            color: #999;
            font-size: 12px;
            font-style: italic;
        }

        .message.error {
            color: #f44336;
            font-size: 13px;
        }

        .message.history {
            opacity: 0.7;
            font-size: 13px;
        }

        .message.own {
            text-align: right;
        }

        .message-content {
            display: inline-block;
            max-width: 70%;
            padding: 10px 12px;
            border-radius: 8px;
            background: #e8eaf6;
            word-wrap: break-word;
        }

        .message.own .message-content {
            background: #667eea;
            color: white;
        }

        .message.other .message-content {
            background: #f0f0f0;
        }

        .message-username {
            font-size: 11px;
            color: #999;
            margin-bottom: 3px;
        }

        .message.own .message-username {
            color: #667eea;
        }

        .message-time {
            font-size: 10px;
            color: #bbb;
            margin-top: 3px;
        }

        .message.own .message-time {
            color: #999;
        }

        .input-area {
            padding: 15px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        .input-area button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .input-area button:hover {
            background: #764ba2;
        }

        .input-area button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 RPG Chat</h1>
            <div class="status disconnected" id="status">Desconectado</div>
        </div>

        <div id="loginForm" class="login-form">
            <div class="form-group">
                <input type="text" id="loginInput" placeholder="Login" value="player1">
                <input type="password" id="passwordInput" placeholder="Senha" value="senha123">
                <input type="password" id="pinInput" placeholder="PIN" value="5678">
                <button onclick="login()">Entrar</button>
            </div>
            <div style="font-size: 12px; color: #999;">
                <p>Teste com o Master: login=master, senha=master123, pin=1234</p>
                <p>(Será bloqueado - apenas players podem acessar o chat)</p>
            </div>
        </div>

        <div id="chatContainer" class="hidden">
            <div class="messages" id="messages"></div>

            <div class="input-area">
                <input 
                    type="text" 
                    id="messageInput" 
                    placeholder="Digite sua mensagem..." 
                    onkeypress="handleKeyPress(event)"
                >
                <button onclick="sendMessage()">Enviar</button>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let token = null;
        let userId = null;
        let username = null;

        const API_URL = "http://localhost:8000";
        const WS_URL = "ws://localhost:8000";

        // Login
        async function login() {
            const login = document.getElementById("loginInput").value;
            const password = document.getElementById("passwordInput").value;
            const pin = document.getElementById("pinInput").value;

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ login, password, pin })
                });

                if (!response.ok) {
                    addMessage({
                        user_id: 0,
                        username: "Sistema",
                        message: "Erro ao fazer login",
                        message_type: "error"
                    });
                    return;
                }

                const data = await response.json();
                token = data.access_token;
                userId = data.user_id;
                username = login;

                connectWebSocket();
            } catch (error) {
                addMessage({
                    user_id: 0,
                    username: "Sistema",
                    message: `Erro: ${error.message}`,
                    message_type: "error"
                });
            }
        }

        // Conectar WebSocket
        function connectWebSocket() {
            const wsUrl = `${WS_URL}/chat/ws?token=${token}`;
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                console.log("Conectado ao chat!");
                updateStatus(true);
                document.getElementById("loginForm").classList.add("hidden");
                document.getElementById("chatContainer").classList.remove("hidden");
            };

            ws.onmessage = (event) => {
                const message = JSON.parse(event.data);
                addMessage(message);
            };

            ws.onerror = (event) => {
                console.error("WebSocket erro:", event);
                addMessage({
                    user_id: 0,
                    username: "Sistema",
                    message: "Erro de conexão",
                    message_type: "error"
                });
            };

            ws.onclose = () => {
                console.log("Desconectado do chat");
                updateStatus(false);
                document.getElementById("loginForm").classList.remove("hidden");
                document.getElementById("chatContainer").classList.add("hidden");
            };
        }

        // Enviar mensagem
        function sendMessage() {
            const input = document.getElementById("messageInput");
            const message = input.value.trim();

            if (!message || !ws || ws.readyState !== WebSocket.OPEN) {
                return;
            }

            ws.send(JSON.stringify({ message }));
            input.value = "";
        }

        // Adicionar mensagem ao chat
        function addMessage(msg) {
            const messagesDiv = document.getElementById("messages");
            const messageEl = document.createElement("div");
            messageEl.className = "message";

            if (msg.message_type === "system") {
                messageEl.classList.add("system");
                messageEl.innerHTML = msg.message;
            } else if (msg.message_type === "error") {
                messageEl.classList.add("error");
                messageEl.innerHTML = `⚠️ ${msg.message}`;
            } else if (msg.message_type === "history") {
                messageEl.classList.add("history");
                const time = new Date(msg.created_at).toLocaleTimeString("pt-BR");
                messageEl.innerHTML = `
                    <div class="message-username">${msg.username} (histórico)</div>
                    <div class="message-content">${escapeHtml(msg.message)}</div>
                    <div class="message-time">${time}</div>
                `;
            } else {
                if (msg.user_id === userId) {
                    messageEl.classList.add("own");
                } else {
                    messageEl.classList.add("other");
                }

                const time = new Date(msg.created_at).toLocaleTimeString("pt-BR");
                messageEl.innerHTML = `
                    <div class="message-username">${msg.username}</div>
                    <div class="message-content">${escapeHtml(msg.message)}</div>
                    <div class="message-time">${time}</div>
                `;
            }

            messagesDiv.appendChild(messageEl);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // Escapar HTML
        function escapeHtml(text) {
            const map = {
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                '"': "&quot;",
                "'": "&#039;"
            };
            return text.replace(/[&<>"']/g, (m) => map[m]);
        }

        // Atualizar status
        function updateStatus(connected) {
            const status = document.getElementById("status");
            if (connected) {
                status.textContent = `✓ Conectado como ${username}`;
                status.classList.remove("disconnected");
                status.classList.add("connected");
            } else {
                status.textContent = "Desconectado";
                status.classList.add("disconnected");
                status.classList.remove("connected");
            }
        }

        // Enter para enviar
        function handleKeyPress(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        }
    </script>
</body>
</html>
